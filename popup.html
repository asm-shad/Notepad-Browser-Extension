<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Notepad</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>📝 My Notes</h2>
    <div class="search-area">
        <input type="text" id="searchInput" placeholder="🔍 Search notes..." class="search-input">
    </div>
    
    <!-- Input area for new notes -->
    <div class="input-area">
      <textarea id="noteInput" placeholder="Write your note here..."></textarea>
      <button id="saveBtn">➕ Save Note</button>
    </div>
    <!-- <div class="stats-bar">
        <span id="charCount">0 characters</span>
        <span id="wordCount">0 words</span>
        <span id="noteCount">0 notes</span>
    </div> -->
    
    <!-- List of saved notes -->
    <div class="notes-list">
      <h3>Saved Notes</h3>
      <div id="notesContainer">
        <div class="empty-message">No notes yet. Add one above!</div>
      </div>
    </div>
    <div class="export-area">
        <button id="exportBtn" class="export-btn">💾 Export Notes</button>
        <button id="importBtn" class="import-btn">📂 Import Notes</button>
    </div>
  </div>
  
  <script src="consts.js" type="module"></script>
  <script src="popup.js" type="module"></script>
</body>
</html>
